<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gaffar1337</title>

<style>
body {margin:0; overflow:hidden; font-family:sans-serif;}
#bg-video {
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}
.overlay {
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}
.card {
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
text-align:center;
color:white;
backdrop-filter:blur(10px);
}
img {
width:100px;
border-radius:50%;
}
button {
margin-top:10px;
padding:10px;
}
</style>
</head>

<body>

<video autoplay muted loop id="bg-video">
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<div class="card">
<img src="pp.jpg">
<h1>gaffar1337</h1>

<button onclick="document.getElementById('music').play()">
Müziği Aç
</button>

</div>

</body>
</html>
